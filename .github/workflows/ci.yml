name: CI / Deploy

on:
  push:
    branches: [dev, test, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  JAVA_VERSION: '21'
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: bem13-java-app

jobs:

  # ── Job 1: Build & Test ─────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn verify -B --no-transfer-progress -T 1C

      - name: Upload JAR
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # ── Job 2: Build Docker image & Push to ECR ─────────────────────
  build-and-push:
    name: Build & Push to ECR
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: image
        run: |
          REPO="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"

      # S3 upload happens BEFORE ECR push to prevent EventBridge race condition.
      - name: Upload CodeDeploy artifacts to S3
        env:
          ENV_NAME: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
        run: |
          sed "s|<IMAGE1_NAME>|${{ steps.image.outputs.repo }}:latest|g; \
               s|EXECUTION_ROLE_ARN_PLACEHOLDER|${{ secrets.ECS_EXEC_ROLE_ARN }}|g; \
               s|TASK_ROLE_ARN_PLACEHOLDER|${{ secrets.ECS_TASK_ROLE_ARN }}|g; \
               s|ENV_PLACEHOLDER|${ENV_NAME}|g" \
            codedeploy/taskdef.json > /tmp/taskdef.json
          cp codedeploy/appspec.yaml /tmp/appspec.yaml
          cd /tmp && zip -q deploy-artifacts.zip taskdef.json appspec.yaml
          aws s3 cp deploy-artifacts.zip "s3://${{ secrets.ARTIFACTS_BUCKET }}/${ENV_NAME}/deploy-artifacts.zip"

      - name: Build and push Docker image
        run: |
          docker build -t "${{ steps.image.outputs.repo }}" .
          docker push "${{ steps.image.outputs.repo }}"

      - name: Summary
        run: echo "::notice title=Image pushed::${{ steps.image.outputs.repo }}:latest"
